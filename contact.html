<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Contact — Addict by Vivy. Horaires d'ouverture, adresses Marrakech & Bruxelles.">
  <meta name="theme-color" content="#0a0a0a">
  <title>Contact — Addict by Gatsby</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <!-- Neue Montreal via Bunny Fonts -->
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=neue-montreal:300,400,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #0a0a0a;
      color: #d4d0c8;
      font-family: 'Neue Montreal', 'Montserrat', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ===================== NAVBAR ===================== */
    .navbar {
      position: fixed;
      top: 8px;
      left: 8px;
      right: 8px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(27, 51, 39, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(42, 77, 58, 0.5);
      border-radius: 50px;
      padding: 7px 7px 7px 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      flex-shrink: 0;
      border: none;
      outline: none;
    }

    .logo__img {
      height: 36px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .navbar__btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .pill-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-family: 'Neue Montreal', 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #e8e4de;
      background: #3a5c48;
      border: 1px solid #4a6e58;
      padding: 10px 18px;
      border-radius: 50px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .pill-btn:hover {
      background: #476b55;
      border-color: #5a7e68;
    }

    .pill-btn:focus-visible,
    .logo:focus-visible {
      outline: 2px solid #c9a96e;
      outline-offset: 4px;
    }

    /* ===================== HERO ===================== */
    .hero {
      position: relative;
      width: 100%;
      /* Account for navbar height */
      padding-top: 64px;
    }

    .hero__img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
    }

    .hero__img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Dark gradient overlay bottom of hero */
    .hero__img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0) 50%,
        rgba(0,0,0,0.55) 100%
      );
      pointer-events: none;
    }

    /* "CONTACT" label bottom-left of hero image */
    .hero__label {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-family: 'Neue Montreal', 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #f0ede8;
      z-index: 2;
    }

    /* ===================== HORAIRES SECTION ===================== */
    .horaires {
      padding: 40px 24px;
    }

    .horaires__heading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .horaires__line {
      flex: 1;
      height: 1px;
      background: rgba(201,169,110,0.3);
      max-width: 80px;
    }

    .horaires__title {
      font-family: 'Neue Montreal', 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c9a96e;
      white-space: nowrap;
    }

    .horaires__table {
      width: 100%;
      border-collapse: collapse;
    }

    .horaires__table tr {
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .horaires__table tr:last-child {
      border-bottom: none;
    }

    .horaires__table td {
      padding: 10px 0;
      font-family: 'Neue Montreal', 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #b8b4ac;
      letter-spacing: 0.5px;
    }

    .horaires__table td:first-child {
      text-align: left;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 2px;
      color: #d4d0c8;
      padding-right: 20px;
    }

    .horaires__table td:last-child {
      text-align: right;
      color: #c9a96e;
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* ===================== PHOTO GRID ===================== */
    .photo-grid {
      padding: 0 16px 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 6px;
    }

    .photo-grid__item {
      overflow: hidden;
      border-radius: 4px;
      background: #111;
      aspect-ratio: 1 / 1;
    }

    .photo-grid__item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }

    .photo-grid__item:hover img {
      transform: scale(1.04);
    }

    /* ===================== RETROUVEZ-NOUS ===================== */
    .addresses {
      padding: 32px 24px 16px;
    }

    .addresses__tag {
      display: block;
      text-align: center;
      font-family: 'Neue Montreal', 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 20px;
    }

    .addresses__list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .addresses__item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #b8b4ac;
      font-family: 'Neue Montreal', 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 300;
      line-height: 1.5;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .addresses__item:hover {
      color: #c9a96e;
    }

    .addresses__pin {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      color: #c9a96e;
      margin-top: 2px;
    }

    /* ===================== FOOTER ===================== */
    .site-footer {
      margin-top: 40px;
      padding: 20px 24px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .site-footer__text {
      font-family: 'Neue Montreal', 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 1px;
      color: #6b6b6b;
    }

    .site-footer__arrow {
      color: #6b6b6b;
      font-size: 12px;
      line-height: 1;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .site-footer__arrow:hover {
      color: #c9a96e;
    }

    /* ===================== DESKTOP ===================== */
    @media (min-width: 769px) {
      /* Navbar */
      .navbar {
        top: 24px;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: auto;
        max-width: calc(100% - 48px);
        padding: 10px 10px 10px 36px;
        white-space: nowrap;
      }

      .logo__img {
        height: 48px;
      }

      .navbar__btns { gap: 8px; }

      .pill-btn {
        font-size: 11px;
        letter-spacing: 2.5px;
        padding: 12px 28px;
      }

      /* Hero */
      .hero {
        padding-top: 120px;
      }

      .hero__img-wrap {
        aspect-ratio: 16 / 7;
        max-height: 520px;
      }

      .hero__label {
        font-size: 12px;
        letter-spacing: 4px;
        bottom: 24px;
        left: 40px;
      }

      /* Horaires */
      .horaires {
        padding: 64px 0;
        max-width: 680px;
        margin: 0 auto;
      }

      .horaires__title {
        font-size: 10px;
        letter-spacing: 4px;
      }

      .horaires__table td {
        font-size: 13px;
        padding: 13px 0;
      }

      .horaires__table td:first-child {
        font-size: 11px;
        letter-spacing: 3px;
      }

      .horaires__table td:last-child {
        font-size: 13px;
      }

      /* Photo grid */
      .photo-grid {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 40px 64px;
        gap: 10px;
      }

      .photo-grid__item {
        aspect-ratio: 4 / 3;
      }

      /* Addresses */
      .addresses {
        max-width: 680px;
        margin: 0 auto;
        padding: 48px 0 24px;
      }

      .addresses__tag {
        font-size: 10px;
        letter-spacing: 4px;
        margin-bottom: 28px;
      }

      .addresses__list {
        flex-direction: row;
        justify-content: center;
        gap: 48px;
      }

      .addresses__item {
        font-size: 13px;
        align-items: center;
      }

      .addresses__pin {
        width: 16px;
        height: 16px;
        margin-top: 0;
      }

      /* Footer */
      .site-footer {
        padding: 28px 40px 40px;
      }

      .site-footer__text {
        font-size: 11px;
      }
    }

    @media (min-width: 1200px) {
      .navbar {
        top: 28px;
        width: auto;
        padding: 12px 12px 12px 44px;
      }

      .logo__img {
        height: 54px;
      }

      .pill-btn {
        font-size: 12px;
        letter-spacing: 3px;
        padding: 13px 32px;
      }

      .hero__img-wrap {
        max-height: 620px;
      }

      .horaires {
        max-width: 760px;
      }

      .photo-grid {
        max-width: 1200px;
        padding: 0 80px 80px;
        gap: 12px;
      }

      .addresses {
        max-width: 760px;
      }

      .addresses__list {
        gap: 72px;
      }

      .addresses__item {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR (same as index) ===== -->
  <nav class="navbar" aria-label="Navigation principale">
    <a href="index.html" class="logo" aria-label="Addict by Vivy - Accueil">
      <img src="assets/logo.png" alt="Addict by Gatsby" class="logo__img">
    </a>
    <div class="navbar__btns">
      <a href="menu.html" class="pill-btn">Menu</a>
      <a href="contact.html" class="pill-btn">Contact</a>
    </div>
  </nav>

  <!-- ===== HERO IMAGE ===== -->
  <section class="hero">
    <div class="hero__img-wrap">
      <!--
        Replace src with your actual hero image.
        Using a placeholder that matches the dark green lounge aesthetic.
      -->
      <img
        src="assets/contact/hero-contact.jpg"
        alt="Ambiance lounge Addict by Vivy"
        onerror="this.style.background='#1a2e23'; this.removeAttribute('src')"
      >
      <span class="hero__label">CONTACT</span>
    </div>
  </section>

  <!-- ===== HORAIRES D'OUVERTURE ===== -->
  <section class="horaires" aria-label="Horaires d'ouverture">
    <div class="horaires__heading">
      <span class="horaires__line"></span>
      <span class="horaires__title">Horaires d'ouverture</span>
      <span class="horaires__line"></span>
    </div>

    <table class="horaires__table" aria-label="Tableau des horaires d'ouverture">
      <tbody>
        <tr>
          <td>Lundi</td>
          <td>17:00 – 22:30</td>
        </tr>
        <tr>
          <td>Mardi</td>
          <td>17:00 – 22:30</td>
        </tr>
        <tr>
          <td>Mercredi</td>
          <td>17:00 – 22:30</td>
        </tr>
        <tr>
          <td>Jeudi</td>
          <td>17:00 – 22:30</td>
        </tr>
        <tr>
          <td>Vendredi</td>
          <td>17:00 – 22:30</td>
        </tr>
        <tr>
          <td>Sam &amp; Dim</td>
          <td>17:00 – 22:30</td>
        </tr>
      </tbody>
    </table>
  </section>

  <!-- ===== PHOTO GRID 2×2 ===== -->
  <section class="photo-grid" aria-label="Galerie photos">
    <div class="photo-grid__item">
      <img src="assets/gallery/photo-1.jpg" alt="Cocktails et chicha Addict by Gatsby"
        onerror="this.style.background='#141f1a'; this.removeAttribute('src')">
    </div>
    <div class="photo-grid__item">
      <img src="assets/gallery/photo-2.jpg" alt="Salon lounge Addict by Gatsby"
        onerror="this.style.background='#1a2e23'; this.removeAttribute('src')">
    </div>
    <div class="photo-grid__item">
      <img src="assets/gallery/photo-3.jpg" alt="Façade Addict by Gatsby"
        onerror="this.style.background='#0f1e16'; this.removeAttribute('src')">
    </div>
    <div class="photo-grid__item">
      <img src="assets/gallery/photo-4.jpg" alt="Chichas et cocktails Addict by Gatsby"
        onerror="this.style.background='#162418'; this.removeAttribute('src')">
    </div>
  </section>

  <!-- ===== RETROUVEZ-NOUS ===== -->
  <section class="addresses" aria-label="Nos adresses">
    <span class="addresses__tag">Retrouvez-nous</span>
    <div class="addresses__list">
      <a
        href="https://maps.google.com/?q=20+Rue+du+Draa+Marrakech"
        target="_blank"
        rel="noopener noreferrer"
        class="addresses__item"
      >
        <svg class="addresses__pin" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/>
        </svg>
        <span>20 Rue du Draa, Marrakesh 40000</span>
      </a>
      <a
        href="https://maps.google.com/?q=Bergensesteenweg+1043+1070+Bruxelles"
        target="_blank"
        rel="noopener noreferrer"
        class="addresses__item"
      >
        <svg class="addresses__pin" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/>
        </svg>
        <span>Bergensesteenweg 1043, 1070 Bruxelles, Belgium</span>
      </a>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <span class="site-footer__text">© 2025 Addict by Gatsby</span>
    <a href="#" class="site-footer__arrow" aria-label="Retour en haut de page">↗</a>
  </footer>

</body>
</html>
