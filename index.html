<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Addict by Gatsby — Lounge bar & restaurant à Marrakech et Bruxelles. Chichas, sushi, cocktails dans une ambiance luxe et intimiste.">
  <meta name="keywords" content="lounge bar, marrakech, bruxelles, chicha, sushi, cocktails, restaurant, addict by Gatsby">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Addict by Gatsby — Lounge Bar & Restaurant">
  <meta property="og:description" content="Chichas, sushi & cocktails dans une ambiance luxe et intimiste. Marrakech & Bruxelles.">
  <meta property="og:type" content="website">
  <title>Addict by Gatsby</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <!-- Neue Montreal via Bunny Fonts -->
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=neue-montreal:300,400,500&display=swap" rel="stylesheet">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Neue Montreal', 'Montserrat', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- FULLSCREEN BACKGROUND ---- */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg video,
    .bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.4) 0%,
        rgba(0,0,0,0.05) 30%,
        rgba(0,0,0,0.05) 70%,
        rgba(0,0,0,0.25) 100%
      );
      pointer-events: none;
    }

    /* ---- NAVBAR ---- */
    .navbar {
      position: fixed;
      top: 8px;
      left: 8px;
      right: 8px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(27, 51, 39, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(42, 77, 58, 0.5);
      border-radius: 50px;
      padding: 7px 7px 7px 16px;
    }

    /* ---- LOGO IMAGE ---- */
    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      flex-shrink: 0;
      border: none;
      outline: none;
    }

    .logo__img {
      height: 36px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    /* ---- BUTTONS GROUP ---- */
    .navbar__btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    /* ---- PILL BUTTON ---- */
    .pill-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-family: 'Neue Montreal', 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #e8e4de;
      background: #3a5c48;
      border: 1px solid #4a6e58;
      padding: 10px 18px;
      border-radius: 50px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .pill-btn:hover {
      background: #476b55;
      border-color: #5a7e68;
    }

    .pill-btn:focus-visible,
    .logo:focus-visible {
      outline: 2px solid #c9a96e;
      outline-offset: 4px;
    }

    /* ---- DESKTOP ---- */
    @media (min-width: 769px) {
      .navbar {
        top: 24px;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: auto;
        max-width: calc(100% - 48px);
        padding: 10px 10px 10px 24px;
        white-space: nowrap;
      }

      .logo__img {
        height: 48px;
      }

      .navbar__btns {
        gap: 8px;
      }

      .pill-btn {
        font-size: 11px;
        letter-spacing: 2.5px;
        padding: 12px 28px;
      }
    }

    @media (min-width: 1200px) {
      .navbar {
        top: 28px;
        padding: 12px 12px 12px 28px;
      }

      .logo__img {
        height: 54px;
      }

      .pill-btn {
        font-size: 12px;
        letter-spacing: 3px;
        padding: 13px 32px;
      }
    }

    /* ---- ADDRESSES BAR — bottom ---- */
    .addresses {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 28px;
    }

    .addresses__inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 24px 36px;
    }

    .addresses__tag {
      display: inline-block;
      font-family: 'Neue Montreal', 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c9a96e;
      border: 1px solid rgba(201,169,110,0.35);
      border-radius: 50px;
      padding: 8px 24px;
      margin-bottom: 4px;
    }

    .addresses__list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .addresses__item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #d4d0c8;
      font-family: 'Neue Montreal', 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 300;
    }

    .addresses__pin {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: #c9a96e;
    }

    .addresses__item--link {
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .addresses__item--link:hover {
      color: #c9a96e;
    }

    @media (min-width: 769px) {
      .addresses {
        padding: 32px 40px 36px;
      }

      .addresses__list {
        flex-direction: row;
        justify-content: center;
        gap: 48px;
      }

      .addresses__item {
        font-size: 15px;
      }

      .addresses__tag {
        font-size: 11px;
        padding: 9px 28px;
      }
    }

    @media (min-width: 1200px) {
      .addresses__item {
        font-size: 16px;
      }

      .addresses__list {
        gap: 64px;
      }
    }
  </style>
</head>
<body>

  <!-- Fullscreen Video Background -->
  <div class="bg">
    <video autoplay muted loop playsinline preload="metadata" poster="assets/hero/poster.jpg">
      <source src="assets/hero/videohero.MP4" type="video/mp4">
    </video>
  </div>

  <!-- Navbar -->
  <nav class="navbar" aria-label="Navigation principale">
    <a href="index.html" class="logo" aria-label="Addict by Gatsby - Accueil">
      <img src="assets/logo.png" alt="Addict by Gatsby" class="logo__img">
    </a>
    <div class="navbar__btns">
      <a href="menu.html" class="pill-btn">Menu</a>
      <a href="contact.html" class="pill-btn">Contact</a>
    </div>
  </nav>

  <!-- Addresses & Phone -->
  <footer class="addresses">
    <div class="addresses__inner">
      <span class="addresses__tag">Retrouvez-nous</span>
      <div class="addresses__list">
        <div class="addresses__item">
          <svg class="addresses__pin" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
          <span>20 Rue du Draa, Marrakech 40000</span>
        </div>
        <div class="addresses__item">
          <svg class="addresses__pin" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
          <span>Bergensesteenweg 1043, 1070 Bruxelles, Belgium</span>
        </div>
      </div>
      <span class="addresses__tag">Appelez-nous</span>
      <div class="addresses__list">
        <a href="tel:+212600642015" class="addresses__item addresses__item--link">
          <svg class="addresses__pin" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.57.57a1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.02l-2.2 2.2z"/></svg>
          <span>+212 600-642015 </span>
        </a>
      </div>
    </div>
  </footer>

</body>
</html>
